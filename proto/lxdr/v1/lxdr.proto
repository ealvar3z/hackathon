message RequestHeader {
  // Section 9. These fields correspond to the header concept in
  // chapters 1-3 and the canonical text example in section 17.1.

  string local_system_date = 1;
  string local_system_time = 2;

  // Calculated and not passed in the canonical exchange rules, but part
  // of the header model.
  optional string utc_time = 3;
  optional string military_dtg = 4;

  string synchronized_geospatial_reference = 5;
  string local_request_id = 6;

  // Returned as part of synchronized replacement.
  optional string synchronized_request_id = 7;

  RequestPriorityCode request_priority = 8;
  string element_unit_id_or_callsign = 9;
  uint32 request_segment_count = 10;
}

message LinkFrame {
  string link_message_id = 1;
  LinkDeliveryMethod delivery_method = 2;
  LinkRepresentation representation = 3;

  oneof payload {
    RequestContainer request_container = 10;
    SynchronizedResponse synchronized_response = 11;
    CanonicalRegistry canonical_registry = 12;
  }
}

message SynchronizedResponse {
  // Section 9.3 and section 17.2.
  string local_request_id = 1;
  string synchronized_request_id = 2;
}

message CanonicalRegistryFieldEntry {
  // Section 19.1.
  string activity = 1;
  string data_element = 2;
  string data_field = 3;
  CanonicalFileType canonical_file = 4;
  string canonical_block = 5;
  string canonical_field = 6;
  string source_reference = 7;
  ExchangeRole exchange_role = 8;
}

message CanonicalRegistry {
  repeated CanonicalRegistryFieldEntry entries = 1;
}

message RequestContainer {
  // Section 8. One request header with one or more request segments.
  RequestHeader header = 1;
  repeated RequestSegment segments = 2;
}

message RequestSegment {
  FunctionFamily function_family = 1;

  oneof segment {
    MobilityPaxRequestSegment mobility_pax = 2;
    MobilityCargoRequestSegment mobility_cargo = 3;
    SupplyRequestSegment supply = 4;
    MaintenanceRequestSegment maintenance = 5;
    EngineerReconAreaReportSegment engineer_recon_area = 6;
    EngineerReconZoneReportSegment engineer_recon_zone = 7;
    EngineerReconRouteReportSegment engineer_recon_route = 8;
    EngineerReconRoadReportSegment engineer_recon_road = 9;
    EngineerReconLandingZoneReportSegment engineer_recon_landing_zone = 10;
    GeneralEngineeringObstacleRemovalSegment obstacle_removal = 11;
    ExplosiveOrdnanceDisposalSegment eod = 12;
    GeneralEngineeringBulkLiquidSupportSegment bulk_liquid_support = 13;
    GeneralEngineeringDemolitionSegment demolition = 14;
    HealthCollectionSegment health_collection = 15;
    HealthTriageSegment health_triage = 16;
    HealthInterventionSegment health_intervention = 17;
    HealthHoldSegment health_hold = 18;
    HealthEvacuationSegment health_evacuation = 19;
  }
}

message MobilityPaxRequestSegment {
  // Section 11.1 and canonical example in section 17.6.
  uint32 segment_number = 1;
  MobilityPaxRequestTypeCode request_type_code = 2;
  RequestPriorityCode request_priority = 3;
  string zap_or_edi_pi = 4;
  string earliest_departure_date_local = 5;
  string latest_departure_date_local = 6;
  string departure_location = 7;
  string destination_location = 8;
  string total_estimated_baggage_weight_lbs = 9;
  string hazardous_material_type = 10;

  // Calculated, not passed.
  optional uint32 person_count = 11;
  optional string total_baggage_weight_lbs = 12;
}

message MobilityCargoRequestSegment {
  // Section 11.2 and canonical example in section 17.7.
  uint32 segment_number = 1;
  MobilityCargoRequestTypeCode request_type_code = 2;
  RequestPriorityCode request_priority = 3;
  string item_by_niin = 4;
  string item_quantity = 5;
  string serial_number = 6;
  string gross_weight_lbs = 7;
  string actual_height_inches = 8;
  string actual_width_inches = 9;
  string actual_length_inches = 10;
  CargoHMICCode hmic = 11;
  CargoHandlingCode handling = 12;
  string earliest_departure_date_local = 13;
  string latest_departure_date_local = 14;
  string departure_location = 15;
  string destination_location = 16;

  // Calculated, not passed.
  optional uint32 item_count = 17;
  optional string total_weight_lbs = 18;
}

message SupplyRequestSegment {
  // Section 12.1.
  uint32 segment_number = 1;
  SupplyRequestTypeCode request_type_code = 2;
  RequestPriorityCode request_priority = 3;

  // Optional when unknown. Narrative may be used instead.
  optional string item_by_niin = 4;

  string item_quantity = 5;
  string required_delivery_date_local = 6;
  string delivery_location = 7;

  // The current draft defines attachment only as an optional indicator
  // in the request segment.
  optional AttachmentIndicatorCode attachment_indicator = 8;
  optional string narrative = 9;
}

message MaintenanceRequestSegment {
  // Section 13.1.
  uint32 segment_number = 1;
  MaintenanceRequestTypeCode request_type_code = 2;
  RequestPriorityCode request_priority = 3;

  optional string serial_number = 4;
  string niin = 5;
  optional string model_of_equipment = 6;
  optional string item_nomenclature = 7;
  string number_of_pieces_requiring_support = 8;
  MaintenanceOperationalConditionCode equipment_operational_condition = 9;
  string date_maintenance_support_required_local = 10;
  string location_of_equipment = 11;
  MaintenanceSupportTypeCode type_of_maintenance_support_required = 12;
  MaintenanceRepairTypeCode type_of_repair = 13;
  MaintenanceMajorDefectCode repair_major_defect = 14;
  AttachmentIndicatorCode attachment_indicator = 15;
  optional string narrative = 16;
}

message EngineerReconAreaItemReport {
  string item_location = 1;
  string item_label = 2;
}

message EngineerReconAreaWaterSource {
  string flow_rate_velocity = 1;
  string quantity_kiloliters = 2;
}

message EngineerReconAreaReportSegment {
  // Section 3.7.3.1 and Table 19.
  string date_of_evaluation_local = 1;
  string element_leader_zap_or_edi_pi = 2;
  string area_location = 3;
  optional EngineerReconAreaWaterSource water_source = 4;
  repeated EngineerReconAreaItemReport items_report = 5;
  optional AttachmentIndicatorCode attachment_indicator = 6;
  optional string narrative = 7;
}

message EngineerReconZoneEnemyReport {
  string enemy_location = 1;
  string enemy_label = 2;
}

message EngineerReconZoneReportSegment {
  // Section 3.7.3.2 and Table 20.
  string date_of_evaluation_local = 1;
  string element_leader_zap_or_edi_pi = 2;
  optional string amphibious_crossing_classification = 3;
  repeated EngineerReconZoneEnemyReport enemy_report = 4;
  string zone_location = 5;
  optional EngineerReconAreaWaterSource water_source = 6;
  repeated EngineerReconAreaItemReport items_report = 7;
  optional AttachmentIndicatorCode attachment_indicator = 8;
  optional string narrative = 9;
}

message EngineerReconRouteReportSegment {
  // Section 3.7.3.3 and Table 21.
  string date_of_evaluation_local = 1;
  string element_leader_zap_or_edi_pi = 2;
  repeated EngineerReconZoneEnemyReport enemy_report = 3;
  repeated string route_locations = 4;
  optional EngineerReconAreaWaterSource water_source = 5;
  repeated EngineerReconAreaItemReport items_report = 6;
  optional AttachmentIndicatorCode attachment_indicator = 7;
  optional string narrative = 8;
}

message EngineerReconRoadReportSegment {
  // Section 3.7.3.4 and Table 22.
  string date_of_evaluation_local = 1;
  string start_point_location = 2;
  string end_point_location = 3;
  RoadClassificationCode road_classification = 4;
  RoadDrainageCode drainage = 5;
  RoadFoundationCode foundation = 6;
  RoadSurfaceTypeCode surface_type = 7;
  string obstructions = 8;
  optional AttachmentIndicatorCode attachment_indicator = 9;
  optional string narrative = 10;
}

message EngineerReconLandingZoneReportSegment {
  // Section 3.7.3.10 and Table 28.
  string date_of_evaluation_local = 1;
  string location = 2;
  EstimateCode estimate = 3;
  LandingZoneLayoutDesignationCode layout_designation = 4;
  uint32 landing_point_capacity = 5;
  uint32 landing_zone_capacity = 6;
  uint32 landing_site_capacity = 7;
  string landing_zone_width_feet = 8;
  string landing_zone_length_feet = 9;
  AircraftSupportabilityCode aircraft_supportability = 10;
  CardinalDirectionCode landing_zone_approach = 11;
  CardinalDirectionCode landing_zone_departure = 12;
  LandingZoneSurfaceSlopeCode landing_zone_surface_slope = 13;
  LandingZoneObstacleCode obstacle = 14;
  optional AttachmentIndicatorCode attachment_indicator = 15;
  optional string narrative = 16;
}

message GeneralEngineeringObstacleRemovalSegment {
  // Section 3.7.3.11 and Table 29.
  string date_of_evaluation_local = 1;
  string location = 2;
  ObstacleActionCode obstacle = 3;
  string min_max_length_feet = 4;
  string min_max_width_feet = 5;
  string min_max_depth_feet = 6;
  string route_number = 7;
  ObstacleDeterminationCode determination_of_action = 8;
  BypassCode bypass = 9;
  string bypass_grid = 10;
  optional AttachmentIndicatorCode attachment_indicator = 11;
  optional string narrative = 12;
}

message ExplosiveOrdnanceDisposalSegment {
  // Section 3.7.3.12 and Table 30.
  string date_of_uxo_discovery = 1;
  string requested_date_of_eod_action = 2;
  string location_of_uxo = 3;
  CBRNAgentTypeCode type_of_cbrn_agent = 4;
  optional CBRNPhysicalPropertyCode physical_property_of_cbrn_agent = 5;
  optional CBRNContaminationValueCode contamination_value_of_cbrn_agent = 6;
  string munition_color = 7;
  string munition_markings = 8;
  MunitionPurposeCode munition_purpose = 9;
  MunitionTypeCode munition_type = 10;
  optional AttachmentIndicatorCode attachment_indicator = 11;
  optional string narrative = 12;
}

message GeneralEngineeringBulkLiquidSupportSegment {
  // Section 3.7.3.13 and Table 31.
  string date_of_evaluation_local = 1;
  string location_of_bulk_liquid = 2;
  EstimateCode estimate = 3;
  optional string fuel = 4;
  optional string water = 5;
  optional AttachmentIndicatorCode attachment_indicator = 6;
  optional string narrative = 7;
}

message GeneralEngineeringDemolitionSegment {
  // Section 3.7.3.14 and Table 32.
  string date_of_evaluation_local = 1;
  string location = 2;
  string type_of_demolition = 3;
  string route_number = 4;
  ObstacleDeterminationCode determination_of_action = 5;
  BypassCode bypass = 6;
  string bypass_grid = 7;
  optional AttachmentIndicatorCode attachment_indicator = 8;
  optional string narrative = 9;
}

message HealthCollectionSegment {
  // Section 3.8.3.1 and Table 33.
  uint32 segment_number = 1;
  HealthCollectionRequestTypeCode request_type_code = 2;
  RequestPriorityCode request_priority = 3;
  string zap_or_edi_pi = 4;
  string last_name = 5;
  string first_name = 6;
  optional ServiceCode service = 7;
  optional string element_unit_identification_or_callsign = 8;
  string allergies = 9;
  string date_of_injury_local = 10;
  string time_of_injury_local = 11;
  string location_injury_occurred = 12;
}

message HealthTriageSegment {
  // Section 3.8.3.2 and Table 34.
  HealthPrimaryMechanismCode primary_mechanism_of_injury = 1;
  HealthCBRNExposureCode cbrn_related_exposure = 2;
  HealthMajorSignsSymptomsCode major_signs_symptoms = 3;
  repeated string injury_locations = 4;
  optional string vitals_check_date_local = 5;
  optional string vitals_check_time_local = 6;
  optional string body_temperature_fahrenheit = 7;
  optional string pulse_rate = 8;
  optional HealthPulseLocationCode pulse_location = 9;
  optional string blood_pressure = 10;
  optional string respiratory_rate = 11;
  optional string pulse_oximetry_percent = 12;
  optional HealthResponsivenessCode responsiveness = 13;
  optional uint32 pain_scale = 14;
  HealthTriagePrecedenceCode triage_precedence = 15;
}

message TourniquetTreatment {
  TourniquetPlacementCode placement = 1;
  TourniquetTypeCode type = 2;
  string date_local = 3;
  string time_local = 4;
}

message FluidCirculationTreatment {
  optional FluidNameCode fluid_name_code = 1;
  optional string other_fluid_name = 2;
  string volume_dose = 3;
  FluidRouteCode route = 4;
  string date_local = 5;
  string time_local = 6;
}

message BloodCirculationTreatment {
  BloodProductCode blood_product_name = 1;
  string volume_dose = 2;
  FluidRouteCode route = 3;
  string date_local = 4;
  string time_local = 5;
}

message AnalgesicMedicationTreatment {
  optional AnalgesicMedicationCode medication_code = 1;
  optional string other_medication_name = 2;
  string volume_dose = 3;
  MedicationRouteCode route = 4;
  string date_local = 5;
  string time_local = 6;
}

message AntibioticMedicationTreatment {
  optional AntibioticMedicationCode medication_code = 1;
  optional string other_medication_name = 2;
  string volume_dose = 3;
  MedicationRouteCode route = 4;
  string date_local = 5;
  string time_local = 6;
}

message OtherMedicationTreatment {
  optional OtherMedicationCode medication_code = 1;
  optional string other_medication_name = 2;
  string volume_dose = 3;
  MedicationRouteCode route = 4;
  string date_local = 5;
  string time_local = 6;
}

message HealthInterventionSegment {
  // Section 3.8.3.2 and Table 35.
  repeated TourniquetTreatment tourniquets = 1;
  repeated WoundTreatmentCode wound_treatments = 2;
  AirwayTreatmentCode airway_treatment = 3;
  BreathingTreatmentCode breathing_treatment = 4;
  repeated FluidCirculationTreatment fluid_circulation_treatments = 5;
  repeated BloodCirculationTreatment blood_circulation_treatments = 6;
  repeated AnalgesicMedicationTreatment analgesic_medication_treatments = 7;
  repeated AntibioticMedicationTreatment antibiotic_medication_treatments = 8;
  repeated OtherMedicationTreatment other_medication_treatments = 9;
  CasualtyTypeCode casualty_type = 10;
  string first_responder_zap_or_edi_pi = 11;
}

message HealthHoldSegment {
  // Section 3.8.3.3.
  // Hold adds append-only triage and intervention updates and does not
  // define new closed-field domains in the source text.
  repeated HealthTriageSegment triage_entries = 1;
  repeated HealthInterventionSegment intervention_entries = 2;
}

message HealthEvacuationPrecedenceCount {
  HealthTriagePrecedenceCode precedence = 1;
  string casualty_count = 2;
}

message HealthEvacuationCasualtyTypeCount {
  HealthEvacuationCasualtyTypeCode casualty_type = 1;
  string casualty_count = 2;
}

message HealthEvacuationCasualtyRecord {
  string zap_or_edi_pi = 1;
  optional HealthPrimaryMechanismCode primary_mechanism_of_injury = 2;
  optional string major_injury_code = 3;
  optional string body_temperature_fahrenheit = 4;
  optional string pulse_rate_and_location = 5;
  optional string blood_pressure = 6;
  optional string respiratory_rate = 7;
  repeated TourniquetTreatment tourniquets = 8;
  repeated WoundTreatmentCode wound_treatments = 9;
  optional AirwayTreatmentCode airway_treatment = 10;
  optional BreathingTreatmentCode breathing_treatment = 11;
  optional FluidCirculationTreatment fluid_circulation_treatment = 12;
  optional BloodCirculationTreatment blood_circulation_treatment = 13;
  optional AnalgesicMedicationTreatment analgesic_medication_treatment = 14;
  optional AntibioticMedicationTreatment antibiotic_medication_treatment = 15;
  optional OtherMedicationTreatment other_medication_treatment = 16;
  optional HealthCBRNExposureCode cbrn_related_exposure = 17;
}

message HealthEvacuationSegment {
  // Section 3.8.3.4 and Table 36.
  HealthEvacuationRequestPriorityCode request_priority = 1;
  string location_of_pickup = 2;
  optional HealthEvacuationLocationMarkingCode location_marking = 3;
  optional HealthEvacuationContaminationCode location_contamination = 4;
  string contact_settings = 5;
  repeated HealthEvacuationPrecedenceCount count_of_casualties_precedence = 6;
  repeated HealthEvacuationCasualtyTypeCount count_of_casualty_types = 7;
  optional HealthEvacuationRequestedEquipmentCode requested_equipment = 8;
  optional HealthEvacuationSecurityCode security = 9;
  repeated HealthEvacuationCasualtyRecord casualties = 10;
}
