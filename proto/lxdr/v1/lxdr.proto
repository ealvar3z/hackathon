syntax = "proto3";

package lxdr.v1;

// LXDR v1 core schema.
//
// This schema is derived strictly from docs/lxdr-protocol.md as it
// currently stands. It models only the protocol objects and segment
// families already defined in the draft:
// - request header
// - synchronized response
// - request container
// - mobility PAX request segment
// - mobility cargo request segment
// - supply request segment
// - maintenance request segment
// - engineer reconnaissance road report segment
// - engineer reconnaissance landing zone report segment
// - general engineering obstacle removal segment
//
// It does not yet model:
// - general engineering segment families
// - health services segment families
// - transport, fragmentation, crypto, or bearer behavior

enum FunctionFamily {
  FUNCTION_FAMILY_UNSPECIFIED = 0;
  FUNCTION_FAMILY_MOBILITY = 1;
  FUNCTION_FAMILY_SUPPLY = 2;
  FUNCTION_FAMILY_MAINTENANCE = 3;
  FUNCTION_FAMILY_GENERAL_ENGINEERING = 4;
  FUNCTION_FAMILY_HEALTH_SERVICES = 5;
}

enum RequestPriorityCode {
  REQUEST_PRIORITY_CODE_UNSPECIFIED = 0;
  REQUEST_PRIORITY_CODE_01 = 1;
  REQUEST_PRIORITY_CODE_02 = 2;
  REQUEST_PRIORITY_CODE_03 = 3;
  REQUEST_PRIORITY_CODE_04 = 4;
  REQUEST_PRIORITY_CODE_05 = 5;
  REQUEST_PRIORITY_CODE_06 = 6;
  REQUEST_PRIORITY_CODE_07 = 7;
  REQUEST_PRIORITY_CODE_08 = 8;
  REQUEST_PRIORITY_CODE_09 = 9;
  REQUEST_PRIORITY_CODE_10 = 10;
  REQUEST_PRIORITY_CODE_11 = 11;
  REQUEST_PRIORITY_CODE_12 = 12;
  REQUEST_PRIORITY_CODE_13 = 13;
  REQUEST_PRIORITY_CODE_14 = 14;
  REQUEST_PRIORITY_CODE_15 = 15;
}

enum MobilityPaxRequestTypeCode {
  MOBILITY_PAX_REQUEST_TYPE_CODE_UNSPECIFIED = 0;
  MOBILITY_PAX_REQUEST_TYPE_CODE_PM = 1;
}

enum MobilityCargoRequestTypeCode {
  MOBILITY_CARGO_REQUEST_TYPE_CODE_UNSPECIFIED = 0;
  MOBILITY_CARGO_REQUEST_TYPE_CODE_CM = 1;
}

