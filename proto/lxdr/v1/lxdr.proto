syntax = "proto3";

package lxdr.v1;

option go_package = "lxdr/lxdr;lxdr";

// LXDR v1 core schema.
//
// This schema is derived strictly from docs/lxdr-protocol.md as it
// currently stands. It models the current v1 protocol objects and the
// implemented Chapter 3 segment families:
// - request header
// - synchronized response
// - request container
// - link frame
// - mobility PAX request segment
// - mobility cargo request segment
// - supply request segment
// - maintenance request segment
// - engineer reconnaissance area, zone, route, road, and landing zone
// - general engineering obstacle removal, bulk liquid support, demolition
// - explosive ordnance disposal clearing/rendering safe
// - health services collection, triage, intervention, hold, and CASEVAC
// - canonical registry schema
//
// It does not yet model:
// - deferred engineer reconnaissance segment families
// - transport, fragmentation, crypto, or bearer behavior

enum FunctionFamily {
  FUNCTION_FAMILY_UNSPECIFIED = 0;
  FUNCTION_FAMILY_MOBILITY = 1;
  FUNCTION_FAMILY_SUPPLY = 2;
  FUNCTION_FAMILY_MAINTENANCE = 3;
  FUNCTION_FAMILY_GENERAL_ENGINEERING = 4;
  FUNCTION_FAMILY_HEALTH_SERVICES = 5;
}

