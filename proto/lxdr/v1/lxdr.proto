  CARGO_HMIC_CODE_UNSPECIFIED = 0;
  CARGO_HMIC_CODE_D = 1;
  CARGO_HMIC_CODE_N = 2;
  CARGO_HMIC_CODE_P = 3;
  CARGO_HMIC_CODE_Y = 4;
}

enum CargoHandlingCode {
  CARGO_HANDLING_CODE_UNSPECIFIED = 0;
  CARGO_HANDLING_CODE_C = 1;
  CARGO_HANDLING_CODE_M = 2;
  CARGO_HANDLING_CODE_T = 3;
  CARGO_HANDLING_CODE_R = 4;
  CARGO_HANDLING_CODE_X = 5;
}

enum SupplyRequestTypeCode {
  SUPPLY_REQUEST_TYPE_CODE_UNSPECIFIED = 0;
  SUPPLY_REQUEST_TYPE_CODE_SR = 1;
}

enum MaintenanceRequestTypeCode {
  MAINTENANCE_REQUEST_TYPE_CODE_UNSPECIFIED = 0;
  MAINTENANCE_REQUEST_TYPE_CODE_CM = 1;
}

enum AttachmentIndicatorCode {
  ATTACHMENT_INDICATOR_CODE_UNSPECIFIED = 0;
  ATTACHMENT_INDICATOR_CODE_NO = 1;
  ATTACHMENT_INDICATOR_CODE_YES = 2;
}

enum MaintenanceOperationalConditionCode {
  MAINTENANCE_OPERATIONAL_CONDITION_CODE_UNSPECIFIED = 0;
  MAINTENANCE_OPERATIONAL_CONDITION_CODE_A = 1;
  MAINTENANCE_OPERATIONAL_CONDITION_CODE_B = 2;
  MAINTENANCE_OPERATIONAL_CONDITION_CODE_C = 3;
}

enum MaintenanceSupportTypeCode {
  MAINTENANCE_SUPPORT_TYPE_CODE_UNSPECIFIED = 0;
  MAINTENANCE_SUPPORT_TYPE_CODE_XX = 1;
  MAINTENANCE_SUPPORT_TYPE_CODE_R1 = 2;
  MAINTENANCE_SUPPORT_TYPE_CODE_R2 = 3;
  MAINTENANCE_SUPPORT_TYPE_CODE_R3 = 4;
  MAINTENANCE_SUPPORT_TYPE_CODE_R4 = 5;
}

enum MaintenanceRepairTypeCode {
  MAINTENANCE_REPAIR_TYPE_CODE_UNSPECIFIED = 0;
  MAINTENANCE_REPAIR_TYPE_CODE_M1 = 1;
  MAINTENANCE_REPAIR_TYPE_CODE_S1 = 2;
  MAINTENANCE_REPAIR_TYPE_CODE_S2 = 3;
  MAINTENANCE_REPAIR_TYPE_CODE_C1 = 4;
  MAINTENANCE_REPAIR_TYPE_CODE_D1 = 5;
